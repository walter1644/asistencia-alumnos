<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Asistencia Alumnos</title>
</head>
<body>
    <div class="contenido">
        <h1>Asistencia Alumnos</h1>
        <div class="input-group">
            <label for="alumno">Nombre del alumno:</label>
            <input type="text" id="alumno" class="color">
            <br>
            <label for="numero">Número del alumno:</label>
            <input type="number" id="numero" class="color">
            <br>
            <label for= "fecha">Fecha:</label>
            <input type="date" id="fecha" class="color">
            <br>
            <label for = "valor">Valor:</label>
            <input type="number" id="valor" class="color">
            <br>
            <button onclick="registrar()">Registrar</button>
            <button onclick="descargarCSV()">Descargar CSV</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
